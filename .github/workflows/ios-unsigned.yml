name: Build unsigned iOS IPA

on:
  workflow_dispatch:
    inputs:
      frontend_preview:
        description: Build the standalone frontend preview without login
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      EXPO_PUBLIC_FRONTEND_PREVIEW: ${{ github.event_name == 'workflow_dispatch' && inputs.frontend_preview && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm typecheck
      - name: Generate and verify the iOS asset export
        shell: bash
        run: |
          pnpm exec expo export --platform ios --output-dir "$RUNNER_TEMP/hermes-font-export"
          node scripts/verify-native-font-export.mjs "$RUNNER_TEMP/hermes-font-export"
          if [ "$EXPO_PUBLIC_FRONTEND_PREVIEW" = "0" ]; then
            node scripts/verify-production-bundle.mjs "$RUNNER_TEMP/hermes-font-export"
          fi
      - name: Select Xcode with Swift 6.2
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version
          swift --version
      - name: Generate the native iOS project
        run: pnpm exec expo prebuild --platform ios --clean --no-install
      - name: Verify native extension targets
        shell: bash
        run: |
          PROJECT_FILE="$(find ios -maxdepth 2 -name project.pbxproj -print -quit)"
          test -n "$PROJECT_FILE"
          for target in HermesWeatherWidget HermesWatchApp HermesWatchExtension HermesDeviceActivityMonitor HermesDeviceActivityReport; do
            grep -q "$target" "$PROJECT_FILE"
          done
          DEPENDENCY_COUNT="$(grep -c 'isa = PBXTargetDependency;' "$PROJECT_FILE")"
          test "$DEPENDENCY_COUNT" -ge 5
      - name: Install CocoaPods
        run: pod install --project-directory=ios
      - name: Verify native context autolinking
        run: node scripts/verify-ios-native-context.mjs --ios ios
      - name: Compile without code signing
        shell: bash
        run: |
          WORKSPACE="$(find ios -maxdepth 1 -type d -name '*.xcworkspace' -print -quit)"
          SCHEME="$(basename "$WORKSPACE" .xcworkspace)"
          if [ -z "$WORKSPACE" ] || [ -z "$SCHEME" ]; then
            echo 'Unable to locate the generated Xcode workspace.' >&2
            exit 1
          fi
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$RUNNER_TEMP/hermes-build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            DEVELOPMENT_TEAM='' \
            COMPILER_INDEX_STORE_ENABLE=NO
          node scripts/verify-ios-native-context.mjs \
            --ios ios \
            --derived-data "$RUNNER_TEMP/hermes-build"
      - name: Package the IPA
        id: package
        shell: bash
        run: |
          APP_PATH="$(find "$RUNNER_TEMP/hermes-build/Build/Products/Release-iphoneos" -maxdepth 1 -type d -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo 'The unsigned .app bundle was not produced.' >&2
            exit 1
          fi
          APP_BUILD_NUMBER="$(plutil -extract CFBundleVersion raw "$APP_PATH/Info.plist")"
          verify_bundle_version() {
            local bundle="$1"
            local actual
            actual="$(plutil -extract CFBundleVersion raw "$bundle/Info.plist")"
            if [ "$actual" != "$APP_BUILD_NUMBER" ]; then
              echo "Bundle version mismatch: $bundle has $actual, app has $APP_BUILD_NUMBER" >&2
              exit 1
            fi
          }
          for extension in HermesWeatherWidget HermesDeviceActivityMonitor HermesDeviceActivityReport; do
            EXTENSION_PATH="$APP_PATH/PlugIns/$extension.appex"
            test -d "$EXTENSION_PATH"
            plutil -extract CFBundleIdentifier raw "$EXTENSION_PATH/Info.plist" >/dev/null
            verify_bundle_version "$EXTENSION_PATH"
          done
          WATCH_APP="$APP_PATH/Watch/HermesWatchApp.app"
          WATCH_EXTENSION="$WATCH_APP/PlugIns/HermesWatchExtension.appex"
          test -d "$WATCH_APP"
          test -d "$WATCH_EXTENSION"
          plutil -extract CFBundleIdentifier raw "$WATCH_APP/Info.plist" >/dev/null
          plutil -extract CFBundleIdentifier raw "$WATCH_EXTENSION/Info.plist" >/dev/null
          verify_bundle_version "$WATCH_APP"
          verify_bundle_version "$WATCH_EXTENSION"
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          ditto -c -k --sequesterRsrc --keepParent Payload "$RUNNER_TEMP/Hermes-Agent-unsigned.ipa"
          shasum -a 256 "$RUNNER_TEMP/Hermes-Agent-unsigned.ipa" > "$RUNNER_TEMP/Hermes-Agent-unsigned.ipa.sha256"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          ARTIFACT_NAME="Hermes-Agent-build-${APP_BUILD_NUMBER}-${SHORT_SHA}"
          printf '{"build":"%s","commit":"%s","frontend_preview":%s}\n' \
            "$APP_BUILD_NUMBER" \
            "$GITHUB_SHA" \
            "$([ "$EXPO_PUBLIC_FRONTEND_PREVIEW" = "1" ] && printf true || printf false)" \
            > "$RUNNER_TEMP/Hermes-Agent-build.json"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: |
            ${{ runner.temp }}/Hermes-Agent-unsigned.ipa
            ${{ runner.temp }}/Hermes-Agent-unsigned.ipa.sha256
            ${{ runner.temp }}/Hermes-Agent-build.json
      - name: Publish the tagged release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              "$RUNNER_TEMP/Hermes-Agent-unsigned.ipa" \
              "$RUNNER_TEMP/Hermes-Agent-unsigned.ipa.sha256" \
              "$RUNNER_TEMP/Hermes-Agent-build.json" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "$RUNNER_TEMP/Hermes-Agent-unsigned.ipa" \
              "$RUNNER_TEMP/Hermes-Agent-unsigned.ipa.sha256" \
              "$RUNNER_TEMP/Hermes-Agent-build.json" \
              --generate-notes \
              --title "Hermes Agent $GITHUB_REF_NAME"
          fi
